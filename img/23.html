<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        body {
            background-color: grey;
            font-family: Arial, Helvetica, sans-serif;


        }

        header {
            padding: 50px;
            color: rgba(7, 14, 102, 0.753);
            text-align: center;
            background-color: beige;


        }

        h2 {
            color: rgba(6, 2, 10, 0.705);
        }

        section {
            margin: 20px;
        }

        p {
            font-size: 17px;
            line-height: 1.6;
            color: black;
          }

           a {
            color: blue;
            text-decoration: none;
        }

        a:hover {
            color: red;
            text-decoration: underline;
        }

        
        button {
            background-color: blue;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

         .caja {
            background-color: white;
            border: 2px solid brown;
            padding: 15px;
            margin: 10px 0;
        }

        footer {
            background-color: beige;
            padding: 30px;
            text-align: center;
            color: aqua;
        }
    </style>
    
    <header>
        <h1>Hola y Bienvenido</h1>
    </header>

    <section>

    <h2>¿Que son las hojas de estilo? </h2>
    <p>Las hojas de estilo son documentos o secciones de código escritas en CSS (Cascading Style Sheets) que se utilizan para definir de manera precisa y organizada la presentación visual de un documento, principalmente de páginas web creadas con HTML. </p>

  </section>



</body>
</html>
